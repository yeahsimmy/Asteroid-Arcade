<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asteroid Arcade</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="game-shell">
      <h1>Asteroid Arcade</h1>
      <div class="hud" aria-live="polite">
        <span id="scoreLabel">Score: 0</span>
        <span id="livesLabel">Leben: 3</span>
        <span id="statusLabel">Status: Bereit</span>
      </div>
      <canvas
        id="gameCanvas"
        width="900"
        height="600"
        role="img"
        aria-label="Asteroid Arcade Spielbereich"
      ></canvas>
      <p class="help">
        Steuerung: ←/→ rotieren, ↑ Schub, Leertaste schießen, Enter nach Game Over für Neustart
      </p>
    </main>

    <script src="script.js"></script>
  </body>
</html>
